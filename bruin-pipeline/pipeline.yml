name: bruin-init
schedule: daily #daily, weekly, monthly, yearly
start_date: "2023-03-20" #format: YYYY-MM-DD
catchup: false

default_connections:
  google_cloud_platform: "gcp" #it must be the same name as in the .bruin.yml file

# season_id: 0 = load all areas / competitions / seasons (default).
# season_id: <wyId> = only that season + its competition + area (minimal API calls).
variables:
  season_id:
    type: integer
    minimum: 0
    default: 0
  match_from_date:
    type: string
    default: ""
  match_to_date:
    type: string
    default: ""
  fixture_details:
    type: string
    default: "matches"
  fixture_fetch:
    type: string
    default: ""
